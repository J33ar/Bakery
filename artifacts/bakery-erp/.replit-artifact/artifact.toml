kind = "web"
previewPath = "/"
title = "نظام إدارة المخبز"
version = "1.0.0"
id = "artifacts/bakery-erp"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26012

[services.development]
run = "pnpm --filter @workspace/bakery-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bakery-erp", "run", "build" ]
serve = "static"
publicDir = "artifacts/bakery-erp/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26012"
BASE_PATH = "/"
