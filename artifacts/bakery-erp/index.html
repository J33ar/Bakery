    <script>
      // GitHub Pages SPA: استعادة الصفحة بعد الـ refresh
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          // نستخرج الـ path بدون /Bakery prefix
          var base = '/Bakery';
          var path = redirect.startsWith(base) ? redirect.slice(base.length) : redirect;
          if (path && path !== '/') {
            window.history.replaceState(null, null, base + path);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
