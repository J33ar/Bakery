<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      var base = '/Bakery';
      var rest = path.replace(base, '') || '/';
      sessionStorage.setItem('spa-redirect', rest + window.location.search + window.location.hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
