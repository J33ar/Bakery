<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // الحفاظ على الـ path الكامل عند الـ refresh على GitHub Pages
      var l = window.location;
      sessionStorage.setItem(
        'spa-redirect',
        l.pathname + l.search + l.hash
      );
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/Bakery/');
    </script>
  </head>
  <body></body>
</html>
